<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intercambios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Canvas para poner conffeti -->
    <canvas id="confetti-canvas" class="confetti-rain" style="display:none"></canvas> 
    
    <div id="page-splash" class="page">
        <div class="splash-content text-center px-3">
            <div class="logo-ring mx-auto">🎁</div>
            <h1 class="app-tittle">Intercambio de regalos!!!</h1>
            <p class="app-subtitle">Organiza tu intercambio para cualquier tipo de celebración</p>
            <button class="btn-gold btn-lg px-5 py-3" onclick="goTo('page-step1')">
                Empezemos! &nbsp; <i class="bi bi-arrow-right"></i>
            </button>
            <p class="mt-4 text-muted" style="font-size: .8rem">Proyecto escolar para Tecnologías Web · UAA · ISC 6to Semestre</p>
        </div>
    </div>


    <!-- aqui carga el paso a paso a seguir para el intermcabio -->
    <div class="main-container py-4 px-3 d-flex flex-column align-items-center" id="steps-wrapper" style="min-height:100vh">
        <div id="progress-bar" class="step-bar d-flex mb-4 align-items-center" style="display:none!important">
            <div class="step-dot" id="dot-1"></div>
            <div class="step-dot" id="dot-2"></div>
            <div class="step-dot" id="dot-3"></div>
            <div class="step-dot" id="dot-4"></div>
            <div class="step-dot" id="dot-5"></div>
            <div class="step-dot" id="dot-6"></div>
            <div class="step-dot" id="dot-7"></div>
        </div>
    </div>

    <div id="page-step1" class="page step-section w-100" style="max-width:540px">
        <div class="card-glass p-4">
            <div class="text-center mb-3" style="font-size:2.5rem">Paso 1</div>
            <h2 class="section-title text-gold">Quien organiza?</h2>
            <input id="organizer-name" type="text" class="form-control-dark w-100 mb-3" placeholder="Tu nombre..." />
            <label class="custom-check mt-2">
                <input type="checkbox" id="include-organizer" checked />
                <span>Incluirme en el intercambio</span>
            </label>
            <div class="nav-btns mt-4">
                <button class="btn-gold ms-auto" onclick="saveStep1()">Siguiente paso</button>
            </div>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>

</body>
</html>
